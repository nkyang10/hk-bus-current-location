<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="香港巴士動態 — 即時九巴及龍運路線預計到站時間。Real-time KMB/LWB bus arrival tracking.">
  <meta name="keywords" content="香港巴士, 九巴, 巴士到站時間, KMB, 巴士ETA, 香港交通">
  <meta property="og:title" content="香港巴士動態 — HK Bus Tracker">
  <meta property="og:description" content="即時九巴及龍運路線預計到站時間。Real-time KMB/LWB bus arrival tracking.">
  <meta property="og:type" content="website">
  <title>香港巴士動態 — HK Bus Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23E31837'/><text x='16' y='23' font-size='18' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'>K</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/api.js"></script>
  <script src="js/route.js"></script>
  <script src="js/eta.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Fix Leaflet default icon paths when loaded from file://
    delete L.Icon.Default.prototype._getIconUrl
    L.Icon.Default.mergeOptions({
      iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
      iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
      shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    })

    // Detect file:// protocol — show notice for Chrome/Edge
    if (location.protocol === 'file:' && !navigator.userAgent.includes('Firefox')) {
      document.getElementById('app').innerHTML =
        '<div style="max-width:480px;margin:60px auto;padding:24px;text-align:center;font-family:sans-serif">' +
        '<div style="font-size:48px;margin-bottom:16px">🚌</div>' +
        '<h1 style="font-size:22px;color:#E31837;margin-bottom:8px">請使用 Firefox 開啟</h1>' +
        '<p style="color:#6b7280;font-size:14px;line-height:1.6">' +
        'Chrome 和 Edge 不允許從本機檔案 (file://) 讀取即時資料。<br><br>' +
        '請使用 Firefox 開啟此檔案，或執行以下指令啟動簡易伺服器：<br><br>' +
        '<code style="background:#f3f4f6;padding:8px 16px;border-radius:6px;display:inline-block;font-size:13px">' +
        'npx http-server -p 8080</code><br><br>' +
        '然後開啟 <a href="http://localhost:8080">http://localhost:8080</a></p>' +
        '</div>'
    } else {
      $(function() {
        window.app = new BusTrackerApp()
        window.app.init()
      })
    }
  </script>
</body>
</html>
